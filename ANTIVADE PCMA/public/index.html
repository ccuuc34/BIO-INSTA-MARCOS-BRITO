<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      background-color: #150825;
      color: #F6F6F6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background-image:
        radial-gradient(1px 1px at 20px 30px, rgba(246,246,246,0.35), transparent),
        radial-gradient(1.5px 1.5px at 60px 80px, rgba(175,144,100,0.3), transparent),
        radial-gradient(1px 1px at 110px 20px, rgba(139,79,191,0.3), transparent),
        radial-gradient(2px 2px at 150px 140px, rgba(246,246,246,0.1), transparent);
      background-size: 200px 200px;
    }
    body::after {
      content: '';
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 700px; height: 350px;
      background: #3D1A6E;
      border-radius: 50%; filter: blur(180px); opacity: 0.32;
      pointer-events: none; z-index: 0;
    }

    .progress-wrap {
      position: fixed; top: 0; left: 0; width: 100%; height: 5px;
      background: rgba(255,255,255,0.06); z-index: 50;
    }
    .progress-bar {
      height: 100%; width: 0%;

    .page {

    .card { width: 100%; max-width: 520px; }

    .eyebrow {
      font-family: 'Sora', sans-serif; font-weight: 700; font-size: 11px;
      color: #AF9064; letter-spacing: 0.16em; text-transform: uppercase;
      text-align: center; margin-bottom: 14px;
    }
    .validation-line {

    }
    .headline {
      font-family: 'Sora', sans-serif; font-weight: 800;

    .headline strong { color: #AF9064; }

    .price-box {

    .cta-wrap { width: 100%; margin-top: 22px; }
    .cta-snake {
      position: relative; width: 100%; border-radius: 16px; padding: 3px; overflow: hidden;
      box-shadow: 0 0 70px rgba(10,190,82,0.55), 0 16px 36px rgba(0,0,0,0.5);
    }
    .cta-snake::before {
      content: ''; position: absolute; width: 300%; height: 300%; top: 50%; left: 50%;
      transform: translate(-50%,-50%) rotate(0deg);
      background: conic-gradient(from 0deg, transparent 0deg, transparent 255deg,
        rgba(170,0,0,0.08) 272deg, rgba(210,15,0,0.55) 288deg, #ff3300 302deg,
        #ff6600 316deg, #ff9900 329deg, rgba(255,170,40,0.45) 342deg,

      animation: spin 2.4s linear infinite;
    }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
    .cta {
      display: flex; align-items: center; justify-content: center; gap: 8px;

      background: linear-gradient(135deg, #0abe52 0%, #079040 60%, #056830 100%);
      border: none; border-radius: 13px; cursor: pointer;
      font-family: 'Sora', sans-serif; font-weight: 800; font-size: clamp(13px, 3.6vw, 15px);
      color: #fff; letter-spacing: 0.02em; text-transform: uppercase;

</head>
<body>
  <div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>

      app.style.opacity = 0;

        app.innerHTML = html;

      var abertura = formData.dor === 'tempo'

      mount(

        '<p class="validation-line">' + abertura + '</p>' +
        '<h2 class="headline">Te fazer dominar toda a lei seca do edital da PCMA,as 11 leis que caem, sem perder mais nenhuma semana até 24 de agosto.</h2>' +
