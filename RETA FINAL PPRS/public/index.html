<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reta Final PPRS | Marcos Brito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: 'Sora', sans-serif;
      background-color: #150825;
      color: #F6F6F6;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 24px;
    }
    body::after {
      content: '';
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 700px; height: 350px;
      background: #8b171a;
      border-radius: 50%; filter: blur(180px); opacity: 0.25;
      pointer-events: none; z-index: 0;
    }
    h1 {
      position: relative; z-index: 1;
      font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase;
      font-size: clamp(28px, 8vw, 48px); line-height: 1.3;
      color: #F6F6F6;
    }
    h1 span { color: #AF9064; }
  </style>
</head>
<body>
  <h1>RETA FINAL <span>PPRS</span></h1>
</body>
</html>
