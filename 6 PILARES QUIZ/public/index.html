<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz — Os 6 Pilares | Marcos Brito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      background: #010000;
      color: #fff;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-image:
        radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.35), transparent),
        radial-gradient(1.5px 1.5px at 80px 70px, rgba(255,255,255,0.15), transparent),
        radial-gradient(1px 1px at 140px 20px, rgba(255,60,60,0.22), transparent),
        radial-gradient(2px 2px at 40px 120px, rgba(255,255,255,0.08), transparent);
      background-size: 180px 180px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 22px 22px;
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; top: -80px; left: 50%;
      transform: translateX(-50%);
      width: 520px; height: 320px;
      background: #cc0000;
      border-radius: 50%;
      filter: blur(180px);
      opacity: 0.14;
      pointer-events: none; z-index: 0;
    }

    /* ── Progress bar (fixed top) ── */
    .progress-wrap {
      position: fixed; top: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.07);
      z-index: 200;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #8b171a, #cc0000, #ff5555);
      transition: width 0.55s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 10px rgba(204,0,0,0.7);
    }

    /* ── App ── */
    #app {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 52px 16px 40px;
    }

    .screen {
      width: 100%;
      max-width: 440px;
    }

    .fade-in {
      animation: fadeUp 0.3s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════════
       INTRO
    ══════════════════════════════ */
    .intro-logo {
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: rgba(204,0,0,0.15);
      border: 1px solid rgba(204,0,0,0.3);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-text {
      font-family: 'Sora', sans-serif;
      font-weight: 800; font-size: 13px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.22em; text-transform: uppercase;
    }

    .intro-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(204,0,0,0.1);
      border: 1px solid rgba(204,0,0,0.32);
      border-radius: 999px;
      padding: 5px 14px;
      margin-bottom: 28px;
      font-family: 'Sora', sans-serif;
      font-size: 11px; font-weight: 700;
      color: #ff5555; letter-spacing: 0.1em; text-transform: uppercase;
    }

    .pill-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #ff3333;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.75); }
    }

    .intro-title {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: clamp(26px, 7vw, 34px);
      line-height: 1.2;
      text-align: center;
      margin-bottom: 14px;
      color: #fff;
    }

    .intro-title .accent { color: #ff4444; }

    .intro-sub {
      font-family: 'Nunito', sans-serif;
      font-weight: 600; font-size: 15px;
      color: rgba(255,255,255,0.5);
      text-align: center; line-height: 1.6;
      margin-bottom: 36px; padding: 0 8px;
    }

    .intro-meta {
      display: flex; align-items: center; justify-content: center;
      gap: 14px; margin-bottom: 40px;
    }

    .meta-chip {
      display: flex; align-items: center; gap: 6px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 13px;
      color: rgba(255,255,255,0.38);
    }

    .meta-sep { color: rgba(255,255,255,0.15); font-size: 18px; }

    /* ── CTA (snake border + shimmer) ── */
    .cta-snake {
      position: relative;
      width: 100%;
      border-radius: 17px; padding: 3px; overflow: hidden;
      box-shadow: 0 0 70px rgba(204,0,0,0.45), 0 18px 44px rgba(0,0,0,0.55);
    }

    .cta-snake::before {
      content: ''; position: absolute;
      width: 300%; height: 300%; top: 50%; left: 50%;
      transform: translate(-50%,-50%) rotate(0deg);
      background: conic-gradient(from 0deg, transparent 0deg, transparent 255deg,
        rgba(170,0,0,0.08) 272deg, rgba(210,15,0,0.55) 288deg, #ff3300 302deg,
        #ff6600 316deg, #ff9900 329deg, rgba(255,170,40,0.45) 342deg,
        rgba(255,230,80,0.12) 354deg, transparent 360deg);
      animation: snake-spin 2.4s linear infinite;
    }

    @keyframes snake-spin {
      from { transform: translate(-50%,-50%) rotate(0deg); }
      to   { transform: translate(-50%,-50%) rotate(360deg); }
    }

    .cta-btn {
      position: relative;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%;
      padding: 20px clamp(14px,4vw,24px);
      background: linear-gradient(135deg, #cc0000 0%, #990000 60%, #6b0000 100%);
      border: none; border-radius: 14px;
      font-family: 'Sora', sans-serif; font-weight: 800;
      font-size: clamp(13px,3.8vw,16px);
      color: #fff; letter-spacing: 0.04em; text-transform: uppercase;
      cursor: pointer; white-space: nowrap;
      overflow: hidden; transform: translateY(-2px);
      transition: transform 0.15s;
      text-decoration: none;
    }

    .cta-btn::before {
      content: ''; position: absolute;
      top: -10%; left: -85%; width: 44%; height: 120%;
      background: linear-gradient(100deg, transparent 10%, rgba(255,255,255,0.22) 44%,
        rgba(255,255,255,0.32) 50%, rgba(255,255,255,0.22) 56%, transparent 90%);
      transform: skewX(-12deg);
      animation: shimmer 2.9s ease-in-out infinite; pointer-events: none;
    }

    @keyframes shimmer { 0%, 22% { left: -85%; } 62%, 100% { left: 155%; } }

    .cta-btn:active { transform: scale(0.98) translateY(0); }

    /* ══════════════════════════════
       QUESTION
    ══════════════════════════════ */
    .q-counter {
      font-family: 'Sora', sans-serif;
      font-weight: 700; font-size: 11px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.16em; text-transform: uppercase;
      text-align: center;
      margin-bottom: 22px;
    }

    .q-text {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: clamp(20px, 5.5vw, 26px);
      line-height: 1.3; text-align: center;
      margin-bottom: 8px; color: #fff;
    }

    .q-sub {
      font-family: 'Nunito', sans-serif;
      font-weight: 600; font-size: 14px;
      color: rgba(255,255,255,0.38);
      text-align: center; line-height: 1.5;
      margin-bottom: 28px;
    }

    .options {
      display: flex; flex-direction: column; gap: 11px;
    }

    .option {
      display: flex; align-items: center; gap: 14px;
      padding: 17px 18px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .option:active { transform: scale(0.985); }

    .option.selected {
      background: rgba(204,0,0,0.11);
      border-color: rgba(204,0,0,0.55);
      animation: opt-pulse 0.38s ease;
    }

    @keyframes opt-pulse {
      0%   { transform: scale(1); }
      38%  { transform: scale(1.024); }
      100% { transform: scale(1); }
    }

    .opt-icon {
      font-size: 21px; width: 30px;
      text-align: center; flex-shrink: 0;
    }

    .opt-text {
      flex: 1;
      font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 14px;
      color: rgba(255,255,255,0.78);
      line-height: 1.4;
    }

    .option.selected .opt-text { color: #fff; }

    .opt-check {
      width: 22px; height: 22px; flex-shrink: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.14);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.18s, border-color 0.18s;
    }

    .option.selected .opt-check {
      background: #cc0000; border-color: #cc0000;
    }

    .opt-check-inner {
      display: none;
      width: 6px; height: 10px;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .option.selected .opt-check-inner { display: block; }

    /* ══════════════════════════════
       TRANSITION
    ══════════════════════════════ */
    .transition-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 55vh; text-align: center; padding: 0 16px;
    }

    .transition-icon {
      width: 60px; height: 60px; border-radius: 50%;
      background: rgba(204,0,0,0.1);
      border: 1.5px solid rgba(204,0,0,0.32);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      animation: t-glow 1.5s ease-in-out infinite;
    }

    @keyframes t-glow {
      0%, 100% { box-shadow: 0 0 14px rgba(204,0,0,0.18); }
      50%       { box-shadow: 0 0 30px rgba(204,0,0,0.42); }
    }

    .transition-text {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: clamp(18px, 4.8vw, 23px);
      line-height: 1.4; color: #fff;
      max-width: 300px;
    }

    /* ══════════════════════════════
       LOADING
    ══════════════════════════════ */
    .loading-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 60vh; text-align: center;
    }

    .loading-icon {
      width: 76px; height: 76px; border-radius: 50%;
      background: rgba(204,0,0,0.1);
      border: 1.5px solid rgba(204,0,0,0.28);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 32px;
      animation: scan-pulse 1.2s ease-in-out infinite;
      position: relative;
    }

    .loading-icon::before {
      content: '';
      position: absolute; inset: -8px; border-radius: 50%;
      border: 1px solid rgba(204,0,0,0.12);
      animation: scan-pulse 1.2s ease-in-out infinite reverse;
    }

    @keyframes scan-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(204,0,0,0.2); }
      50%       { box-shadow: 0 0 42px rgba(204,0,0,0.48), 0 0 80px rgba(204,0,0,0.14); }
    }

    .loading-label {
      font-family: 'Sora', sans-serif;
      font-weight: 700; font-size: 11px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 14px;
    }

    .loading-status {
      font-family: 'Nunito', sans-serif;
      font-weight: 600; font-size: 15px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 28px; min-height: 24px;
      transition: opacity 0.28s;
    }

    .loading-bar-wrap {
      width: 240px; height: 4px;
      background: rgba(255,255,255,0.07);
      border-radius: 999px; overflow: hidden;
      margin-bottom: 12px;
    }

    .loading-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #8b171a, #cc0000, #ff5555);
      border-radius: 999px;
      transition: width 0.22s linear;
      box-shadow: 0 0 10px rgba(204,0,0,0.5);
    }

    .loading-pct {
      font-family: 'Sora', sans-serif;
      font-weight: 800; font-size: 13px;
      color: #cc0000; letter-spacing: 0.06em;
    }

    /* ══════════════════════════════
       RESULT
    ══════════════════════════════ */
    .result-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.3);
      border-radius: 999px;
      padding: 5px 14px; margin-bottom: 22px;
      font-family: 'Sora', sans-serif;
      font-size: 11px; font-weight: 700;
      color: #4ade80; letter-spacing: 0.1em; text-transform: uppercase;
    }

    .result-title {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: clamp(24px, 6.5vw, 32px);
      line-height: 1.2; color: #fff;
      margin-bottom: 18px;
    }

    .body-text {
      font-family: 'Nunito', sans-serif;
      font-weight: 600; font-size: 15px;
      color: rgba(255,255,255,0.62);
      line-height: 1.7; margin-bottom: 14px;
    }

    .body-text strong {
      color: rgba(255,255,255,0.9);
      font-weight: 800;
    }

    .divider {
      width: 100%; height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 28px 0;
    }

    .section-label {
      font-family: 'Sora', sans-serif;
      font-weight: 700; font-size: 11px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.18em; text-transform: uppercase;
      margin-bottom: 10px;
    }

    .section-heading {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: clamp(20px, 5.2vw, 26px);
      line-height: 1.3; color: #fff;
      margin-bottom: 16px;
    }

    /* Proof */
    .proof-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-left: 3px solid #cc0000;
      border-radius: 0 12px 12px 0;
      padding: 18px 20px;
    }

    .proof-text {
      font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 15px;
      color: rgba(255,255,255,0.82);
      line-height: 1.6; font-style: italic;
    }

    .proof-author {
      font-family: 'Sora', sans-serif;
      font-weight: 600; font-size: 12px;
      color: rgba(255,255,255,0.3);
      margin-top: 10px;
    }

    /* Offer */
    .offer-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 16px;
      padding: 24px 20px;
      position: relative; overflow: hidden;
    }

    .price-installment {
      font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 15px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
    }

    .price-row {
      display: flex; align-items: baseline; gap: 4px;
      margin-bottom: 8px;
    }

    .price-cur {
      font-family: 'Sora', sans-serif; font-weight: 700;
      font-size: 18px; color: #4ade80;
    }

    .price-val {
      font-family: 'Sora', sans-serif; font-weight: 900;
      font-size: clamp(44px, 12vw, 56px);
      color: #4ade80; line-height: 1;
      text-shadow: 0 0 30px rgba(74,222,128,0.28);
    }

    .price-cts {
      font-family: 'Sora', sans-serif; font-weight: 800;
      font-size: 22px; color: #4ade80;
    }

    .offer-divider {
      width: 100%; height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 18px 0;
    }

    .checklist {
      list-style: none;
      display: flex; flex-direction: column; gap: 12px;
      margin-bottom: 20px;
    }

    .checklist li {
      display: flex; align-items: flex-start; gap: 10px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600; font-size: 14px;
      color: rgba(255,255,255,0.75);
      line-height: 1.45;
    }

    .check-icon {
      width: 18px; height: 18px; flex-shrink: 0;
      background: rgba(74,222,128,0.15);
      border: 1px solid rgba(74,222,128,0.35);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-top: 1px;
    }

    .guarantee-row {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600; font-size: 13px;
      color: rgba(255,255,255,0.35);
      padding-top: 4px;
    }

    /* Above CTA text */
    .above-cta {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: clamp(16px, 4.2vw, 19px);
      color: #fff; line-height: 1.45;
      text-align: center;
      margin-bottom: 20px;
      padding: 0 4px;
    }

    /* Below CTA */
    .below-cta {
      font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 13px;
      color: rgba(255,140,0,0.72);
      text-align: center;
      margin-top: 12px;
      line-height: 1.5;
    }

    /* Final line */
    .final-line {
      margin-top: 36px;
      padding: 20px 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600; font-size: 14px;
      color: rgba(255,255,255,0.42);
      line-height: 1.7;
      text-align: center;
    }

    .footer-sig {
      text-align: center;
      margin-top: 28px;
      font-family: 'Sora', sans-serif;
      font-weight: 700; font-size: 11px;
      color: rgba(255,255,255,0.1);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="progress-wrap">
    <div class="progress-fill" id="pg"></div>
  </div>

  <div id="app"></div>

  <script>
  // ─── Data ────────────────────────────────────────────────────────────────────

  const QUESTIONS = [
    {
      id: 1,
      text: 'Antes de tudo: onde você está agora?',
      sub:  'Seja honesto. Ninguém está te julgando aqui.',
      options: [
        { icon: '📚', text: 'Estou estudando mas não estou onde precisava estar' },
        { icon: '🏆', text: 'Já fiz prova antes e fui reprovado. Não deixo acontecer de novo' },
        { icon: '⚡', text: 'Ainda não comecei de verdade mas sei que precisa mudar agora' },
      ],
      displayPct: 12, answerPct: 24,
      transition: 'Você já está à frente de quem ainda não admitiu isso.',
    },
    {
      id: 2,
      text: 'Qual dessas frases mais parece com a sua semana de estudos?',
      sub:  'Escolha a que dói mais de ler.',
      options: [
        { icon: '📅', text: 'Começo segunda com tudo planejado. Na quarta já desandei' },
        { icon: '🔄', text: 'Consigo estudar alguns dias mas a constância nunca dura' },
        { icon: '🌀', text: 'Sinto que me esforço muito e avanço pouco. Parece que corro no lugar' },
      ],
      displayPct: 24, answerPct: 36,
      transition: 'Isso não é fraqueza. Isso tem nome. E tem solução.',
    },
    {
      id: 3,
      text: 'Quanto tempo você consegue estudar por dia de verdade?',
      sub:  'Não o que você gostaria. O que realmente acontece.',
      options: [
        { icon: '⏱️', text: 'Menos de 2 horas. Trabalho o dia todo e estudo no que sobra' },
        { icon: '📖', text: 'Entre 2 e 4 horas. Estudo nas margens do dia' },
        { icon: '🎯', text: 'Mais de 4 horas. Consigo me dedicar bastante' },
      ],
      displayPct: 36, answerPct: 48,
      transition: 'Com o método certo, o tempo que você tem já é suficiente para passar.',
    },
    {
      id: 4,
      text: 'Como você estuda hoje?',
      sub:  'A resposta certa aqui vai te poupar meses de preparação.',
      options: [
        { icon: '📝', text: 'Releio o material, faço anotações e marco o que parece importante' },
        { icon: '📺', text: 'Assisto videoaula e tento absorver o máximo possível' },
        { icon: '❓', text: 'Faço questões mas sem um método definido por trás' },
      ],
      displayPct: 48, answerPct: 60,
      transition: 'A ciência comprova que esse método não está funcionando como deveria. E tem uma saída mais rápida.',
    },
    {
      id: 5,
      text: 'O que está em jogo de verdade para você nessa aprovação?',
      sub:  'Essa é a pergunta que a maioria nunca para para responder.',
      options: [
        { icon: '👨‍👩‍👧', text: 'Quero dar orgulho pra minha família e sair da CLT de uma vez por todas' },
        { icon: '💔', text: 'Já reprovei antes e não aguento mais olhar pra trás e ver o mesmo lugar' },
        { icon: '🔥', text: 'Sei que sou capaz. Só não consigo fazer acontecer de verdade todos os dias' },
      ],
      displayPct: 60, answerPct: 72,
      transition: 'Quem chegou até aqui já provou que quer de verdade. O que falta é o sistema.',
    },
    {
      id: 6,
      text: 'O que mais te trava hoje?',
      sub:  'Seja específico. Isso define o seu diagnóstico.',

    app.innerHTML = '';
    app.appendChild(el);
    window.scrollTo(0, 0);

  function saveProfile(optIdx) {
    const perfil = PROFILE_MAP[optIdx] || 'PERFIL_CONSTANCIA';
    localStorage.setItem('quiz_perfil_diagnostico', perfil);
    localStorage.setItem('quiz_timestamp', new Date().toISOString());
    localStorage.setItem('quiz_completo', 'true');
    try { gtag('event', 'quiz_perfil_identificado', { perfil, timestamp: new Date().toISOString() }); } catch(e) {}
  }

  function getDiagnostic() {
    const perfil = localStorage.getItem('quiz_perfil_diagnostico') || 'PERFIL_CONSTANCIA';
    return DIAGNOSTICS[perfil] || DIAGNOSTICS.PERFIL_CONSTANCIA;
  }

  // ─── Analytics ───────────────────────────────────────────────────────────────

  function track(qId, optIdx, optText) {
    quiz.analytics['q' + qId] = { optIdx, optText };
    try {
      const raw = JSON.parse(localStorage.getItem('6pilares_quiz') || '{"sessions":[]}');
      raw.sessions = raw.sessions || [];
      if (!raw.sessions.length || raw.sessions[raw.sessions.length - 1].complete) {
        raw.sessions.push({ ts: Date.now(), answers: {}, complete: false });
      }
      raw.sessions[raw.sessions.length - 1].answers['q' + qId] = { optIdx, optText };
      if (raw.sessions.length > 100) raw.sessions = raw.sessions.slice(-100);
      localStorage.setItem('6pilares_quiz', JSON.stringify(raw));
    } catch(e) {}
  }

  function markComplete() {
    try {
      const raw = JSON.parse(localStorage.getItem('6pilares_quiz') || '{}');
      if (raw.sessions && raw.sessions.length) {
        raw.sessions[raw.sessions.length - 1].complete = true;
        localStorage.setItem('6pilares_quiz', JSON.stringify(raw));
      }
    } catch(e) {}
  }

        <div class="opt-text">${opt.text}</div>
        <div class="opt-check"><div class="opt-check-inner"></div></div>

    mount(`

      <h2 class="q-text">${q.text}</h2>
      <p class="q-sub">${q.sub}</p>
      <div class="options">${optsHtml}</div>
    `);
  }

  function selectOpt(qIdx, optIdx) {
    if (quiz.locked) return;
    quiz.locked = true;

    const q   = QUESTIONS[qIdx];
    const opt = q.options[optIdx];
    track(q.id, optIdx, opt.text);

    // Q6 (índice 5) define o perfil do diagnóstico
    if (qIdx === 5) saveProfile(optIdx);

    const el = document.getElementById('opt' + optIdx);
    if (el) el.classList.add('selected');
    setPct(q.answerPct);

    setTimeout(() => {
      if (q.transition) {
        showTransition(q.transition, qIdx);
      } else {
        showLoading();
      }
    }, 420);
  }

              stroke="#ff4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

        </div>
        <p class="transition-text">${text}</p>
      </div>
    `);

    setTimeout(() => {
      const next = qIdx + 1;
      if (next < QUESTIONS.length) showQuestion(next);
      else showLoading();
    }, 1500);
  }

      if (pct >= 100) {
        clearInterval(iv);
        setPct(100);
        setTimeout(showResult, 380);
      }
    }, 90);
